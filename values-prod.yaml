# Prod overrides for m3music

frontend:
  replicaCount: 2
  ingress:
    enabled: true
    hosts:
      - host: m3music.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
  startupProbe:
    httpGet:
      path: /healthz
      port: 8080
    failureThreshold: 30
    periodSeconds: 5

backend:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: 10000
  readinessProbe:
    httpGet:
      path: /ready
      port: 10000
  startupProbe:
    httpGet:
      path: /healthz
      port: 10000
    failureThreshold: 30
    periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: null

env:
  FRONTEND_URL: "https://m3music.example.com"

networkPolicy:
  enabled: true
  backend:
    database:
      cidr: "" # Set to the EC2 MongoDB private IP as /32, for example 10.0.31.10/32.
      port: 27017

