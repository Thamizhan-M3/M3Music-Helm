replicaCount: 1

image:
  repository: m3music-frontend
  pullPolicy: IfNotPresent
  tag: ""

containerPort: 8080

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080

readinessProbe:
  httpGet:
    path: /ready
    port: 8080

startupProbe:
  httpGet:
    path: /healthz
    port: 8080
  failureThreshold: 30
  periodSeconds: 5

pdb:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: m3music.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

imagePullSecrets: []

autoscaling:
  enabled: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: true
  name: ""
