replicaCount: 1

image:
  repository: m3music-backend
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 10000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 10000

readinessProbe:
  httpGet:
    path: /ready
    port: 10000

startupProbe:
  httpGet:
    path: /healthz
    port: 10000
  failureThreshold: 30
  periodSeconds: 5

pdb:
  enabled: true
  minAvailable: 1

imagePullSecrets: []

autoscaling:
  enabled: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: true
  name: ""
