apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "m3music.fullname" . }}-test-connection"
  labels:
    {{- include "m3music.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args:
        - "-qO-"
        - "http://{{ include \"m3music.frontend.fullname\" . }}:{{ .Values.frontend.service.port }}/"
  restartPolicy: Never

