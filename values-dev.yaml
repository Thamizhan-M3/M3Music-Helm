frontend:
  replicaCount: 1
  ingress:
    enabled: true
    hosts:
      - host: m3music-dev.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

backend:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

autoscaling:
  enabled: false

env:
  FRONTEND_URL: "http://m3music-dev.local"

secretEnv:
  # Fill in real secrets
  MONGODB_URI: ""
  JWT_SECRET: ""

